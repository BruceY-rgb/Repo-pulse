name: CI

on:
  push:
    branches:
      - main
      - develop
      - 'feature/**'
  pull_request:
    branches:
      - main
      - develop

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PNPM_VERSION: 9.15.4
  NODE_VERSION: '20'

jobs:
  # ──────────────────────────────────────────────────────────────────────────────
  # Job 1: 所有分支 push 时跑，前后端类型检查 + ESLint
  # ──────────────────────────────────────────────────────────────────────────────
  quality:
    name: Quality (Lint & Typecheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared packages
        run: pnpm --filter=@repo-pulse/shared --filter=@repo-pulse/database --filter=@repo-pulse/ai-sdk build

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Typecheck (web)
        run: pnpm --filter=@repo-pulse/web typecheck

      - name: Typecheck (api)
        run: pnpm --filter=@repo-pulse/api typecheck

      - name: Lint (web)
        run: pnpm --filter=@repo-pulse/web lint -- --max-warnings -1

      - name: Lint (api)
        run: pnpm --filter=@repo-pulse/api lint -- --max-warnings -1

  # ──────────────────────────────────────────────────────────────────────────────
  # Job 2: quality 通过后，验证前端 Vite 构建 + 后端 tsc 编译
  # ──────────────────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared packages
        run: pnpm --filter=@repo-pulse/shared --filter=@repo-pulse/database --filter=@repo-pulse/ai-sdk build

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Build web (Vite)
        run: pnpm --filter=@repo-pulse/web build

      - name: Build api (tsc)
        run: pnpm --filter=@repo-pulse/api build

  # ──────────────────────────────────────────────────────────────────────────────
  # Job 3: 与 build 并行，用真实 DB + Redis 跑端到端测试
  # ──────────────────────────────────────────────────────────────────────────────
  test-e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: quality
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: repopulse
          POSTGRES_PASSWORD: repopulse
          POSTGRES_DB: repopulse_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://repopulse:repopulse@localhost:5432/repopulse_test
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci-e2e-jwt-secret
      JWT_REFRESH_SECRET: ci-e2e-refresh-secret
      FRONTEND_URL: http://localhost:5173
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared packages
        run: pnpm --filter=@repo-pulse/shared --filter=@repo-pulse/database --filter=@repo-pulse/ai-sdk build

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Run DB migrations
        run: pnpm db:migrate

      - name: Run E2E tests
        run: pnpm --filter=@repo-pulse/api test:e2e

  # ──────────────────────────────────────────────────────────────────────────────
  # Job 4: 独立跑 pnpm audit，检查高危依赖漏洞
  # ──────────────────────────────────────────────────────────────────────────────
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit for high severity vulnerabilities
        run: pnpm audit --audit-level=high

  # ──────────────────────────────────────────────────────────────────────────────
  # Job 5: 汇总门禁，quality / build / test-e2e / security 全绿才算 CI 通过
  # ──────────────────────────────────────────────────────────────────────────────
  ci-success:
    name: CI Success
    runs-on: ubuntu-latest
    needs: [quality, build, test-e2e, security]
    if: always()
    steps:
      - name: Check all required jobs
        run: |
          results=(
            "quality=${{ needs.quality.result }}"
            "build=${{ needs.build.result }}"
            "test-e2e=${{ needs.test-e2e.result }}"
            "security=${{ needs.security.result }}"
          )

          failed=0
          for entry in "${results[@]}"; do
            job="${entry%%=*}"
            result="${entry##*=}"
            if [[ "$result" != "success" ]]; then
              echo "❌ $job: $result"
              failed=1
            else
              echo "✅ $job: $result"
            fi
          done

          if [[ $failed -eq 1 ]]; then
            echo ""
            echo "CI 未通过，请修复上述失败的 Job 后重试。"
            exit 1
          fi

          echo ""
          echo "所有 CI 检查通过"
